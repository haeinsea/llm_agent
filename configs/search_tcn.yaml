search_seeds: [0, 1]
selection_metric: f1
score_weights:
  f1: 1.0
  post_shift_recall: 0.35
  recall: 0.10
  auc: 0.10
channels:
  - [64, 96, 128]
  - [96, 128, 128]
dilations:
  - [1, 2, 4]
kernel_size: [3]
dropout: [0.05, 0.1]
expansion_ratio: [2, 3]
pool: [avg, last]
batch_size: [64]
epochs: [20, 25]
lr: [0.0007, 0.0005]
weight_decay: [0.0001, 0.00005]
