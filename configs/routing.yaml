tau_metric: f1
threshold_grid_min: 0.05
threshold_grid_max: 0.95
threshold_grid_step: 0.01
sigmoid_gain: 5.0
temporal_weight_eps: 1.0e-8

q_grid: [0.20, 0.40, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90]
entropy_shortcut_quantile: 0.80
discrepancy_shortcut_quantile: 0.80

llm:
  enabled: true
  mode: openai
  api_env_key: OPENAI_API_KEY
  model_env_key: OPENAI_MODEL
  model: gpt-4o-mini
  temperature: 0.0
  timeout_sec: 60
  max_retries: 4
  retry_backoff_sec: 5.0
  request_pause_sec: 0.5
  allow_stub_fallback: false
  input_cost_per_1m: 0.15
  output_cost_per_1m: 0.60
  avg_prompt_tokens: 950
  avg_completion_tokens: 120
  latency_ms_per_call: 900
